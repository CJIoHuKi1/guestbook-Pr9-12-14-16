{% extends "base.html" %}

{% block content %}
<!-- Задание 6: Страница входа с Bootstrap -->
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">🔐 Вход в гостевую книгу</h4>
            </div>
            <div class="card-body">
                {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endif %}
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">👤 Логин</label>
                        <input type="text" class="form-control" id="username" 
                               name="username" placeholder="Введите логин" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">🔒 Пароль</label>
                        <input type="password" class="form-control" id="password" 
                               name="password" placeholder="Введите пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">🚪 Войти</button>
                </form>
            </div>
            <div class="card-footer text-center text-muted">
                <small>📝 Тестовые данные: <strong>admin</strong> / <strong>123</strong></small>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none">← На главную</a>
        </div>
    </div>
</div>
{% endblock %}
