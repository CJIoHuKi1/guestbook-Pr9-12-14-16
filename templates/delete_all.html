{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white text-center">
                <h4 class="mb-0">⚠️ Удаление всех сообщений</h4>
            </div>
            <div class="card-body text-center">
                <div class="alert alert-warning">
                    <h5>Вы уверены, что хотите удалить все сообщения?</h5>
                    <p class="mb-0">Всего сообщений: <strong>{{ total_count }}</strong></p>
                </div>
                <p class="text-danger">Это действие нельзя отменить!</p>
                <form method="POST" action="/delete-all-confirm" class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger">🗑️ Да, удалить всё</button>
                    <a href="/" class="btn btn-secondary">❌ Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
